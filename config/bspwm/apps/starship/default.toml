"Downloads" = " "
"Music" = "ůįĚö "
"Pictures" = "ůįČŹ "

[git_branch]
symbol = "ůįė¨"
style = "bg:#526070"
format = '[[ $symbol $branch ](fg:#6ab0f5 bg:#526070)]($style)'

[git_status]
style = "bg:#526070"
format = '[[($all_status$ahead_behind )](fg:#6ab0f5 bg:#526070)]($style)'
conflicted = "ůįěá "
ahead = "ůįĀĚ${count} "
behind = "ůįĀÖ${count} "
diverged = "ůįĻļ "
untracked = "ůįĄĪ "
stashed = "ůįÜď "
modified = "ůį∑ą "
staged = "ůįźē "
renamed = "ůįĎē "
deleted = "ůįģČ "

[nodejs]

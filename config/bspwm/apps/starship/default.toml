"$schema" = 'https://starship.rs/config-schema.json'
format = """
[‚ĖĎ‚Ėí‚Ėď](fg:#243140)\
[ ůį£á ](bg:#243140 fg:#9bcbff)\
[Óāī](fg:#243140 bg:#3b4857)\

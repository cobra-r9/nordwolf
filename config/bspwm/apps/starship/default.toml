[time]
disabled = false
time_format = "%R"
style = "bg:#8492a4"
format = '[[  $time ](fg:#3b4857 bg:#8492a4)]($style)'

[character]
success_symbol = "[‚ĚĮ](bold fg:#4c95d9)"

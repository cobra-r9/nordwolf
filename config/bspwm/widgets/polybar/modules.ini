[module/date]
type = internal/date
interval = 1.0

; empty by default → nothing shown; reveals on click
date     =
date-alt = %A, %d %B

; 24h international
time     = %H:%M
time-alt = %H:%M:%S

format = <label>
format-prefix = " "
format-prefix-font = 2
format-prefix-foreground = ${color.BLUE}

; %date% is empty string by default, so only time renders
; on click: "Thursday, 18 June  14:30:42"
label =  %time% %date%
